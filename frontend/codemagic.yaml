# Codemagic config — iOS build for AutoHistorique
# https://docs.codemagic.io/yaml-quick-start/

workflows:
  ios-build:
    name: iOS build
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.autohistorique.app"
      node: 20.x
      xcode: latest
      cocoapods: default
      # Uncomment when you add an Apple Developer Account in Codemagic UI:
      # ios_signing:
      #   distribution_type: ad_hoc         # or app_store / development
      #   bundle_identifier: com.autohistorique.app
    scripts:
      - name: Install Node deps
        script: npm ci
      - name: Build Angular (production)
        script: npm run build:prod
      - name: Sync Capacitor iOS
        script: |
          npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install
      # Uncomment once signing is configured in Codemagic UI:
      # - name: Set up code signing
      #   script: xcode-project use-profiles
      - name: Build unsigned IPA (dev/demo — no signing)
        script: |
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath build/App.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO
    artifacts:
      - build/App.xcarchive/**
      - ios/App/build/**/*.ipa
      - /tmp/xcodebuild_logs/*.log