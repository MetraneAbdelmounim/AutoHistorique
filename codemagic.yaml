# Codemagic — iOS build for AutoHistorique
# https://docs.codemagic.io/yaml-quick-start/

workflows:
  ios-build:
    name: iOS build (unsigned demo)
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      node: 20
      xcode: latest
      cocoapods: default
      vars:
        XCODE_WORKSPACE: "frontend/ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.autohistorique.app"
      # Uncomment when you configure signing in Codemagic UI (Settings → Code signing):
      # ios_signing:
      #   distribution_type: ad_hoc        # or app_store / development
      #   bundle_identifier: com.autohistorique.app

    scripts:
      - name: Install Node deps
        working_directory: frontend
        script: npm ci

      - name: Build Angular (production)
        working_directory: frontend
        script: npm run build:prod

      - name: Add iOS platform if missing
        working_directory: frontend
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi

      - name: Patch Podfile (bump iOS deployment target for Capacitor 8)
        working_directory: frontend/ios/App
        script: |
          # Capacitor 8.x requires iOS 15.6+
          sed -i.bak "s/platform :ios,.*/platform :ios, '15.6'/" Podfile
          grep "platform :ios" Podfile

      - name: Sync Capacitor → iOS
        working_directory: frontend
        script: npx cap sync ios

      - name: Install CocoaPods
        working_directory: frontend/ios/App
        script: pod install --repo-update

      # - name: Set up code signing
      #   script: xcode-project use-profiles

      - name: Build unsigned archive (demo)
        script: |
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath build/App.xcarchive \
            -destination "generic/platform=iOS Simulator" \
            clean archive \
            IPHONEOS_DEPLOYMENT_TARGET=15.6 \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO

    artifacts:
      - build/App.xcarchive/**
      - frontend/ios/App/build/**/*.ipa
      - /tmp/xcodebuild_logs/*.log