services:
  # ─── MongoDB (no auth — only reachable on internal docker network) ──
  mongo:
    image: mongo:7
    restart: unless-stopped
    command: ["mongod", "--bind_ip_all"]
    volumes:
      - mongo_data:/data/db
    networks:
      - internal
    # No public port — only the api container can reach it via "mongo:27017"

  # ─── Node API ─────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGO_URI: mongodb://mongo:27017/${MONGO_DB:-autohistorique}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      FRONTEND_URL: ${FRONTEND_URL}
    networks:
      - internal
    # No public port — only nginx talks to it

  # ─── Nginx reverse proxy + TLS ────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"    # NAT: public 8443 → internal 443
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  mongo_data:
