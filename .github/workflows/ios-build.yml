name: iOS build

on:
  workflow_dispatch:          # manual trigger
  push:
    tags:
      - 'ios-v*'

jobs:
  build-ios:
    runs-on: macos-14
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Node dependencies
        run: npm ci

      - name: Build Angular (production)
        run: npm run build:prod

      - name: Add iOS platform if missing
        run: |
          if [ ! -d "ios" ]; then npx cap add ios; fi

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Install CocoaPods
        working-directory: frontend/ios/App
        run: pod install

      - name: Build unsigned archive (dev only)
        working-directory: frontend/ios/App
        run: |
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath $PWD/build/App.xcarchive \
            -destination "generic/platform=iOS Simulator" \
            clean archive \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoHistorique-iOS-unsigned
          path: frontend/ios/App/build/App.xcarchive
          retention-days: 7