user  nginx;
worker_processes  auto;

error_log   /var/log/nginx/error.log warn;
pid         /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    server_tokens      off;

    gzip               on;
    gzip_vary          on;
    gzip_min_length    1024;
    gzip_types
        application/json
        application/javascript
        text/css
        text/plain
        text/xml
        application/xml;

    limit_req_zone  $binary_remote_addr zone=api:10m rate=30r/s;

    upstream api_upstream {
        server api:3000;
        keepalive 32;
    }

    # ─── HTTP :80 → redirect to HTTPS ───────────────────────
    # Internal: https://$host:443 (default). External clients reach the
    # server directly on HTTPS via NAT 8443→443, so this redirect is
    # mostly for local-network users hitting http://10.190.100.176.
    server {
        listen 80 default_server;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ─── HTTPS :443 (internal) — NAT'd to :8443 externally ──
    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        ssl_protocols               TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers   off;
        ssl_ciphers                 ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_session_cache           shared:SSL:10m;
        ssl_session_timeout         1d;
        ssl_session_tickets         off;

        # Security headers are managed by helmet() in the Node app,
        # so we don't duplicate them here (avoids conflicting values).
        # HSTS is kept at the edge since it's an nginx-level concern.
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        client_max_body_size 5m;

        # ─── /api → Node backend ────────────────────────────
        location /api/ {
            limit_req zone=api burst=60 nodelay;

            proxy_pass              http://api_upstream;
            proxy_http_version      1.1;
            proxy_set_header        Host              $host;
            proxy_set_header        X-Real-IP         $remote_addr;
            proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header        X-Forwarded-Proto https;
            proxy_set_header        Connection        "";

            proxy_connect_timeout   10s;
            proxy_send_timeout      30s;
            proxy_read_timeout      30s;
        }

        location = / {
            return 200 'AutoHistorique API\n';
            add_header Content-Type text/plain;
        }

        location / {
            return 404;
        }
    }
}
