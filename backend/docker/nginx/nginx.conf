user  nginx;
worker_processes  auto;

error_log   /var/log/nginx/error.log warn;
pid         /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    server_tokens      off;   # hide nginx version

    # Gzip
    gzip               on;
    gzip_vary          on;
    gzip_min_length    1024;
    gzip_types
        application/json
        application/javascript
        text/css
        text/plain
        text/xml
        application/xml;

    # Rate limit (defense-in-depth on top of express-rate-limit)
    limit_req_zone  $binary_remote_addr zone=api:10m rate=30r/s;

    # Upstream: the Node backend (resolved via docker DNS)
    upstream api_upstream {
        server api:3000;
        keepalive 32;
    }

    # ─── HTTP :80 → redirect to HTTPS :8443 ─────────────────
    server {
        listen 80 default_server;
        server_name _;
        return 301 https://$host:8443$request_uri;
    }

    # ─── HTTPS :8443 ────────────────────────────────────────
    server {
        listen 8443 ssl;
        http2 on;
        server_name _;

        # TLS certs — mount these from the host at ./docker/nginx/certs
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        # Modern TLS (drop TLS 1.0/1.1, keep 1.2 + 1.3)
        ssl_protocols               TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers   off;
        ssl_ciphers                 ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_session_cache           shared:SSL:10m;
        ssl_session_timeout         1d;
        ssl_session_tickets         off;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options    "nosniff"      always;
        add_header X-Frame-Options           "DENY"         always;
        add_header Referrer-Policy           "no-referrer"  always;

        client_max_body_size 5m;

        # ─── /api → Node backend ────────────────────────────
        location /api/ {
            limit_req zone=api burst=60 nodelay;

            proxy_pass              http://api_upstream;
            proxy_http_version      1.1;
            proxy_set_header        Host              $host;
            proxy_set_header        X-Real-IP         $remote_addr;
            proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header        X-Forwarded-Proto https;
            proxy_set_header        Connection        "";

            proxy_connect_timeout   10s;
            proxy_send_timeout      30s;
            proxy_read_timeout      30s;
        }

        # Health check root (for load balancers / uptime monitors)
        location = / {
            return 200 'AutoHistorique API\n';
            add_header Content-Type text/plain;
        }

        # Everything else → 404
        location / {
            return 404;
        }
    }
}
