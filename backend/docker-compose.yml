services:
  # ─── MongoDB ──────────────────────────────────────────────
  mongo:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-autohistorique}
    volumes:
      - mongo_data:/data/db
    networks:
      - internal
    # No public port — only reachable by the backend container

  # ─── Node API ─────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      NODE_ENV: production
      PORT: 3000
      # Prefer MONGO_URI from .env if set; otherwise compose one from the parts.
      # If your password has @ : / # you MUST set MONGO_URI directly (URL-encoded).
      MONGO_URI: ${MONGO_URI:-mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASS}@mongo:27017/${MONGO_DB:-autohistorique}?authSource=admin}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      FRONTEND_URL: ${FRONTEND_URL}
    networks:
      - internal
    # No public port — only nginx talks to it

  # ─── Nginx reverse proxy + TLS ────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"    # HTTPS
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  mongo_data:
